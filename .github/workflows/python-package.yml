name: Build Executables

on:
  workflow_dispatch:   # ← this line must exist
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller sounddevice scipy pydub numpy

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            SEP=";"
          else
            SEP=":"
          fi

          pyinstaller \
            --onedir \
            --name SaveWisdomRecorder \
            --add-data "QUESTIONS${SEP}QUESTIONS" \
            --add-data "RECORDINGS${SEP}RECORDINGS" \
            --hidden-import sounddevice \
            --hidden-import pydub \
            --hidden-import numpy \
            --hidden-import scipy \
            --hidden-import scipy.io.wavfile \
            --hidden-import tkinter \
            --windowed \
            --clean \
            save_wisdom_recorder.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SaveWisdomRecorder-${{ matrix.os }}
          path: dist/*
