name: Build Executables

on:
  workflow_dispatch:   # ← this line must exist
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller sounddevice scipy pydub numpy

      - name: Build with PyInstaller
        shell: bash                    # ← THIS IS THE MISSING LINE
        run: |
          pyinstaller --onedir --name SaveWisdomRecorder \
            --add-data "QUESTIONS;QUESTIONS" \
            --add-data "RECORDINGS;RECORDINGS" \
            --hidden-import sounddevice \
            --hidden-import pydub \
            --hidden-import numpy \
            --hidden-import scipy.io.wavfile \
            --hidden-import scipy \
            --windowed \
            --clean \
            --log-level=INFO \
            SaveWisdomRecorder.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SaveWisdomRecorder-${{ matrix.os }}
          path: dist/*
