name: Build Executables

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller sounddevice scipy pydub numpy

      - name: Install system dependencies (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libsndfile1 

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            SEP=";"
          else
            SEP=":"
          fi

          # === Only bundle _sounddevice_data on Windows + macOS ===
          if [[ "${{ matrix.os }}" != "ubuntu-latest" ]]; then
            SOUNDDEVICE_DATA=$(python -c "import os, sounddevice; print(os.path.join(os.path.dirname(sounddevice.__file__), '_sounddevice_data'))")
            SOUNDDEVICE_ADD="--add-data \"${SOUNDDEVICE_DATA}${SEP}_sounddevice_data\""
          else
            SOUNDDEVICE_ADD=""
          fi

          # Upgrade to latest PyInstaller (good practice)
          pip install pyinstaller --upgrade

          pyinstaller \
            --onedir \
            --name SaveWisdomRecorder \
            --add-data "QUESTIONS${SEP}QUESTIONS" \
            $SOUNDDEVICE_ADD \
            --collect-all sounddevice \
            --collect-all numpy \
            --collect-all scipy \
            --hidden-import sounddevice \
            --hidden-import pydub \
            --hidden-import numpy \
            --hidden-import scipy \
            --hidden-import scipy.io.wavfile \
            --hidden-import tkinter \
            --windowed \
            --clean \
            save_wisdom_recorder.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SaveWisdomRecorder-${{ matrix.os }}
          path: dist/*
